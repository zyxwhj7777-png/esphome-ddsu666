    id: imp_ep_t2
    name: "正向有功 峰"
    modbus_controller_id: meter
    register_type: holding
    address: 0x1022
    value_type: FP32
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    update_interval: 60s

  # ---------- 正向有功 T3 平 (1024H) ----------
  - platform: modbus_controller
    id: imp_ep_t3
    name: "正向有功 平"
    modbus_controller_id: meter
    register_type: holding
    address: 0x1024
    value_type: FP32
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    update_interval: 60s

  # ---------- 正向有功 T4 谷 (1026H) ----------
  - platform: modbus_controller
    id: imp_ep_t4
    name: "正向有功 谷"
    modbus_controller_id: meter
    register_type: holding
    address: 0x1026
    value_type: FP32
