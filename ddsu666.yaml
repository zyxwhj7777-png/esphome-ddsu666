    name: "A 相电流"
    modbus_controller_id: meter
    register_type: holding
    address: 0x200C
    value_type: FP32
    unit_of_measurement: "A"
    accuracy_decimals: 3
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.001
    update_interval: 3s

  # ---------- B 相电流 (200EH) ----------
  - platform: modbus_controller
    id: ib
    name: "B 相电流"
    modbus_controller_id: meter
    register_type: holding
    address: 0x200E
    value_type: FP32
    unit_of_measurement: "A"
    accuracy_decimals: 3
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.001
    update_interval: 3s

  # ---------- C 相电流 (2010H) ----------
  - platform: modbus_controller
    id: ic
