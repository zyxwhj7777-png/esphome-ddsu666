# =============================================================
# DTSU666 / DSSU666 三相电子式电能表 — ESPHome (ModBus-RTU)
# 正泰仪器仪表 | 文件编号 ZTY0.464.1622
#
# 查询分三级:
#   Lv1 快速(3s)  : 电压 / 电流 / 有功功率 / 无功功率
#   Lv2 中速(15s) : 功率因数 / 频率 / 需量
#   Lv3 慢速(60s) : 电能(正反向/四象限/费率) / 配置参数
#
# 所有可写寄存器均暴露为 number / select / button 实体,
# 可在 HA 或 ESPHome web 上直接操作。
#
# 接线:
#   ESP32 GPIO17(TX) ──► MAX485 DI
#   ESP32 GPIO16(RX) ◄── MAX485 RO
#   ESP32 GPIO4      ──► MAX485 DE/RE (高=发,低=收)
# =============================================================

substitutions:
  device_name: dtsu666
  friendly_name: "DTSU666 电能表"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  reboot_timeout: 0s

ota:
  platform: esphome
  password: !secret ota_password

logger:
  baud_rate: 0          # 释放 UART0 给 RS485 或保持默认 USB 调试

web_server:
  port: 80

# =============================================================
# UART — RS485 通道
# 默认出厂: DL/T 645-2007, 2400bps, E.1
# 客户定制 ModBus: 9600bps, n.1, 地址1
# 请按实际配置修改 baud_rate / parity
# =============================================================
uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600       # ModBus 客户定制默认 9600
  parity: NONE           # n.1 (无校验, 1停止位)
  stop_bits: 1

# =============================================================
# ModBus 总线 + 控制器
# =============================================================
modbus:
  id: modbus1
  uart_id: uart_bus
  flow_control_pin: GPIO4

modbus_controller:
  - id: meter
    address: 1           # 电表通讯地址 (0x002E 可远程改)
    modbus_id: modbus1
    setup_priority: -10
    update_interval: never   # 由各 sensor 独立控制刷新

# =============================================================
#  ██████╗     ██╗      ██████╗  █████╗ ██████╗
#  ██╔══██╗   ███║     ██╔═══██╗██╔══██╗██╔══██╗
#  ██║  ██║   ╚██║     ██║   ██║███████║██║  ██║
#  ██║  ██║    ██║     ██║   ██║██╔══██║██║  ██║
#  ██████╔╝    ██║     ╚██████╔╝██║  ██║██████╔╝
#  ╚═════╝     ╚═╝      ╚═════╝ ╚═╝  ╚═╝╚═════╝
#  电压 / 电流 / 有功功率 / 无功功率 — 每 3 秒
# =============================================================
sensor:
  # ---------- A 相电压 (2006H) ----------
  - platform: modbus_controller
    id: ua
    name: "A 相电压"
    modbus_controller_id: meter
    register_type: holding
    address: 0x2006       # Ua
    value_type: FP32
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1    # 二次值 × 0.1 = V
    update_interval: 3s

  # ---------- B 相电压 (2008H) ----------
  - platform: modbus_controller
    id: ub
    name: "B 相电压"
    modbus_controller_id: meter
    register_type: holding
    address: 0x2008
    value_type: FP32
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- C 相电压 (200AH) ----------
  - platform: modbus_controller
    id: uc
    name: "C 相电压"
    modbus_controller_id: meter
    register_type: holding
    address: 0x200A
    value_type: FP32
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- A 相电流 (200CH) ----------
  - platform: modbus_controller
