  # ---------- 版本号 (0000H) ----------
  - platform: modbus_controller
    id: fw_ver
    name: "固件版本"
    modbus_controller_id: meter
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    entity_category: diagnostic
    update_interval: 60s

  # ---------- 编程密码 (0001H) — 只读显示 ----------
  - platform: modbus_controller
    id: prog_pwd
    name: "编程密码"
    modbus_controller_id: meter
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    entity_category: diagnostic
    update_interval: 60s

# =============================================================
#  ██╗    ██╗██████╗ ██╗████████╗███████╗
#  ██║    ██║██╔══██╗██║╚══██╔══╝██╔════╝
#  ██║ █╗ ██║██████╔╝██║   ██║   █████╗
#  ██║███╗██║██╔══██╗██║   ██║   ██╔══╝
#  ╚███╔███╔╝██║  ██║██║   ██║   ███████╗
#   ╚══╝╚══╝ ╚═╝  ╚═╝╚═╝   ╚═╝   ╚══════╝
#  可写参数 — 通过 number / select / button 暴露
# =============================================================
number:
  # ---------- 电流变比 CT (0006H) ----------
  - platform: modbus_controller
    id: set_ct
    name: "电流变比 CT"
    modbus_controller_id: meter
    register_type: holding
    address: 0x0006
    value_type: S_WORD
    min_value: 1
    max_value: 9999
    step: 1
    entity_category: config
    write_lambda: |-
      return x;

  # ---------- 电压变比 PT (0007H) ----------
  # 实际值 = 寄存器值 × 0.1
  - platform: modbus_controller
    id: set_pt
    name: "电压变比 PT"
    modbus_controller_id: meter
    register_type: holding
    address: 0x0007
    value_type: S_WORD
    min_value: 1
    max_value: 9999
    step: 1
    entity_category: config
    lambda: |-
      // 读回: 寄存器原始值 × 0.1 = 实际 PT
      return x * 0.1f;
    write_lambda: |-
      // 写入: 实际 PT × 10 = 寄存器值
      return x * 10.0f;

  # ---------- 轮显时间 (000AH) ----------
  - platform: modbus_controller
    id: set_disp
    name: "轮显时间"
    modbus_controller_id: meter
    register_type: holding
    address: 0x000A
    value_type: S_WORD
    min_value: 0
    max_value: 30
    step: 1
    unit_of_measurement: "s"
    entity_category: config
    write_lambda: |-
      return x;

  # ---------- 背光时间 (000BH) ----------
  - platform: modbus_controller
    id: set_bl
    name: "背光时间"
    modbus_controller_id: meter
    register_type: holding
    address: 0x000B
    value_type: S_WORD
    min_value: 0
    max_value: 30
    step: 1
    unit_of_measurement: "s"
    entity_category: config
    write_lambda: |-
      return x;

  # ---------- 通讯地址 (002EH) ----------
  - platform: modbus_controller
    id: set_addr
    name: "通讯地址"
    modbus_controller_id: meter
    register_type: holding
    address: 0x002E
    value_type: S_WORD
    min_value: 1
    max_value: 247
    step: 1
    entity_category: config
    write_lambda: |-
      return x;

select:
  # ---------- 通讯协议 (002CH) ----------
  - platform: modbus_controller
    id: set_proto
    name: "通讯协议"
    modbus_controller_id: meter
    register_type: holding
    address: 0x002C
    value_type: S_WORD
    optionsmap:
      "DL/T 645-2007": 1
      "ModBus n.2": 2
      "ModBus n.1": 3
      "ModBus E.1": 4
      "ModBus o.1": 5
    entity_category: config

  # ---------- 波特率 (002DH) ----------
  - platform: modbus_controller
    id: set_baud
    name: "波特率"
    modbus_controller_id: meter
