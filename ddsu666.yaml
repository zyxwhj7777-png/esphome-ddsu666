    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 15s

  # =============================================================
  #  ███████╗███╗   ██╗███████╗██████╗  ██████╗ ██╗   ██╗
  #  ██╔════╝████╗  ██║██╔════╝██╔══██╗██╔═══██╗╚██╗ ██╔╝
  #  █████╗  ██╔██╗ ██║█████╗  ██████╔╝██║   ██║ ╚████╔╝
  #  ██╔══╝  ██║╚██╗██║██╔══╝  ██╔══██╗██║   ██║  ╚██╔╝
  #  ███████╗██║ ╚████║███████╗██║  ██║╚██████╔╝   ██║
  #  ╚══════╝╚═╝  ╚═══╝╚══════╝╚═╝  ╚═╝ ╚═════╝    ╚═╝
  #  电能(正反向/四象限/费率) — 每 60 秒
  # =============================================================

  # ---------- 正向有功总电能 (101EH) ----------
