    id: exp_ep_t1
    name: "反向有功 尖"
    modbus_controller_id: meter
    register_type: holding
    address: 0x102A
    value_type: FP32
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    update_interval: 60s

