    register_type: holding
    address: 0x2012
    value_type: FP32
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- A 相有功功率 (2014H) ----------
  - platform: modbus_controller
    id: pa
    name: "A 相有功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x2014
    value_type: FP32
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- B 相有功功率 (2016H) ----------
  - platform: modbus_controller
    id: pb
    name: "B 相有功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x2016
    value_type: FP32
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- C 相有功功率 (2018H) ----------
  - platform: modbus_controller
    id: pc
    name: "C 相有功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x2018
    value_type: FP32
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- 合相无功功率 (201AH) ----------
  - platform: modbus_controller
    id: qt
    name: "合相无功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x201A
    value_type: FP32
    unit_of_measurement: "var"
    accuracy_decimals: 1
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- A 相无功功率 (201CH) ----------
  - platform: modbus_controller
    id: qa
    name: "A 相无功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x201C
    value_type: FP32
    unit_of_measurement: "var"
    accuracy_decimals: 1
    state_class: measurement
    filters:
      - multiply: 0.1
    update_interval: 3s

  # ---------- B 相无功功率 (201EH) ----------
  - platform: modbus_controller
    id: qb
    name: "B 相无功功率"
    modbus_controller_id: meter
    register_type: holding
    address: 0x201E
    value_type: FP32
    unit_of_measurement: "var"
    accuracy_decimals: 1
    state_class: measurement
    filters:
      - multiply: 0.1
