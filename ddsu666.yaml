    modbus_controller_id: meter
    register_type: holding
    address: 0x202A
    value_type: FP32
    unit_of_measurement: ""
    accuracy_decimals: 3
    device_class: power_factor
    state_class: measurement
    filters:
      - multiply: 0.001
    update_interval: 15s

  # ---------- A 相功率因数 (202CH) ----------
