    name: "正向有功总电能"
    modbus_controller_id: meter
    register_type: holding
    address: 0x101E
    value_type: FP32
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    update_interval: 60s

  # ---------- 正向有功 T1 尖 (1020H) ----------
