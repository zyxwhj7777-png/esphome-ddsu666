    modbus_controller_id: meter
    register_type: holding
    address: 0x1032
    value_type: FP32
    unit_of_measurement: "kvarh"
    accuracy_decimals: 2
    state_class: total_increasing
    update_interval: 60s

  # 第二象限 (103CH)
  - platform: modbus_controller
    id: q2_eq
    name: "第二象限无功电能"
    modbus_controller_id: meter
    register_type: holding
    address: 0x103C
    value_type: FP32
    unit_of_measurement: "kvarh"
    accuracy_decimals: 2
    state_class: total_increasing
    update_interval: 60s

  # 第三象限 (1046H)
  - platform: modbus_controller
    id: q3_eq
    name: "第三象限无功电能"
    modbus_controller_id: meter
    register_type: holding
    address: 0x1046
    value_type: FP32
    unit_of_measurement: "kvarh"
    accuracy_decimals: 2
    state_class: total_increasing
    update_interval: 60s

  # 第四象限 (1050H)
  - platform: modbus_controller
    id: q4_eq
