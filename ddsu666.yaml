# =============================================================
#  ███████╗███████╗██████╗ ██╗   ██╗██╗ ██████╗███████╗
#  ██╔════╝██╔════╝██╔══██╗██║   ██║██║██╔════╝██╔════╝
#  ███████╗█████╗  ██████╔╝██║   ██║██║██║     █████╗
#  ╚════██║██╔══╝  ██╔══██╗╚██╗ ██╔╝██║██║     ██╔══╝
#  ███████║███████╗██║  ██║ ╚████╔╝ ██║╚██████╗███████╗
#  ╚══════╝╚══════╝╚═╝  ╚═╝  ╚═══╝  ╚═╝ ╚═════╝╚══════╝
#  自定义服务 — 设置电表时间 / 读任意寄存器
# =============================================================
api:
  services:
    # ---- 设置电表时间 (年/月/日/时/分/秒 → 002F~0034H) ----
    - service: set_meter_time
      name: "设置电表时间"
      variables:
        year: int
        month: int
        day: int
        hour: int
        minute: int
        second: int
      then:
        - lambda: |-
            // 写多个寄存器 (功能码 0x10)
            // 寄存器顺序: 002F=秒, 0030=分, 0031=时, 0032=日, 0033=月, 0034=年
            std::vector<uint16_t> data = {
              (uint16_t)second,
              (uint16_t)minute,
              (uint16_t)hour,
              (uint16_t)day,
              (uint16_t)month,
              (uint16_t)(year % 100)
            };
            // 通过 modbus_controller 发送原始帧
            auto *call = id(meter).create_write_registers_call();
            call->set_function_code(0x10);
            call->set_address(0x002F);
            call->set_data(data);
            call->perform();

    # ---- 读任意寄存器 (调试用) ----
    - service: read_raw_register
      name: "读原始寄存器"
      variables:
        address: int
        count: int
      then:
        - lambda: |-
            auto *call = id(meter).create_read_registers_call();
            call->set_function_code(0x03);
            call->set_address(address);
            call->set_register_count(count);
            call->perform();

    # ---- 写任意寄存器 (高级调试, 危险!) ----
    - service: write_raw_register
      name: "写原始寄存器"
      variables:
        address: int
        value: int
      then:
        - lambda: |-
            auto *call = id(meter).create_write_registers_call();
            call->set_function_code(0x06);
            call->set_address(address);
            call->set_data({(uint16_t)value});
            call->perform();
