    update_interval: 3s

  # =============================================================
  #  ███╗   ███╗███████╗██████╗ ██╗██╗   ██╗███╗   ███╗
  #  ████╗ ████║██╔════╝██╔══██╗██║██║   ██║████╗ ████║
  #  ██╔████╔██║█████╗  ██║  ██║██║██║   ██║██╔████╔██║
  #  ██║╚██╔╝██║██╔══╝  ██║  ██║██║██║   ██║██║╚██╔╝██║
  #  ██║ ╚═╝ ██║███████╗██████╔╝██║╚██████╔╝██║ ╚═╝ ██║
  #  ╚═╝     ╚═╝╚══════╝╚═════╝ ╚═╝ ╚═════╝ ╚═╝     ╚═╝
  #  功率因数 / 频率 / 需量 — 每 15 秒
  # =============================================================

